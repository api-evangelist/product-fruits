aid: product-fruits
name: Product Fruits
description: >-
  Product Fruits is an AI-powered product adoption platform that enables SaaS
  teams to build in-app onboarding tours, checklists, tooltips, announcements,
  NPS surveys, and user segmentation without requiring developer resources. The
  platform offers a REST API and JavaScript API for programmatic control of
  onboarding flows, user identification, event tracking, knowledge base
  management, and feedback collection.
