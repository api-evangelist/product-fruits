apis:
  - aid: product-fruits:product-fruits-rest-api
    name: Product Fruits REST API
    description: >-
      REST API for managing users, tracking custom events, managing knowledge
      base content, collecting feedback, and controlling onboarding flows
      programmatically. Supports user identification (upsert), event tracking,
      survey responses, and knowledge base article and category management.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
